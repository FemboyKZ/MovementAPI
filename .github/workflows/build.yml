name: build

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup variables
        id: vars
        run: |
          echo "is_tag=${{ startsWith(github.ref, 'refs/tags/') }}" >> $GITHUB_OUTPUT
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            echo "version=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT
          else
            echo "version=git-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup SourcePawn Compiler
        id: setup
        uses: rumblefrog/setup-sp@master
        with:
          version: "1.12.x"

      - name: Create plugins directory
        run: mkdir addons/sourcemod/plugins

      - name: Compile plugin
        run: |
          cd addons/sourcemod/scripting
          spcomp64 -O2 -i "include" movementapi.sp -o "../plugins/movementapi.smx"

      - name: Prepare artifact
        run: |
          mkdir artifact
          cp -r addons artifact

      - name: Upload compiled plugin
        uses: actions/upload-artifact@v7
        with:
          name: movementapi-${{ steps.vars.outputs.version }}.zip
          path: artifact

      - name: Compress plugin
        if: steps.vars.outputs.is_tag == 'true'
        run: |
          mkdir build
          zip -r "build/movementapi-${{ steps.vars.outputs.version }}.zip" addons

      - name: Release
        if: steps.vars.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: "build/movementapi-${{ steps.vars.outputs.version }}.zip"
